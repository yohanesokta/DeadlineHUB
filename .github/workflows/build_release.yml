name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create secrets.json
        run: |
          echo '${{ secrets.SECRETS_JSON }}' > secrets.json
        shell: bash

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Code Generation (Drift DB)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Flutter Release (Windows)
        run: flutter build windows --release

      - name: Compile Inno Setup Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup/windows/installer.iss

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/windows/installer/deadlinehub-windows-installer.exe

  build-linux:
    name: Build Linux Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create secrets.json
        run: |
          echo '${{ secrets.SECRETS_JSON }}' > secrets.json
        shell: bash

      - name: Install Native Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev rpm libsecret-1-dev

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Code Generation (Drift DB)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build and Package for Linux
        run: |
          ./setup/linux/package.sh

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: build/linux/packages/*

  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create secrets.json
        run: |
          echo '${{ secrets.SECRETS_JSON }}' > secrets.json
        shell: bash

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Code Generation (Drift DB)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build and Package for macOS
        run: |
          ./setup/macos/package.sh

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: build/macos/packages/deadlinehub-macos.dmg

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-assets/

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: release-assets/

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          name: Release ${{ github.ref_name }}
          body: |
            Automatic release build for version ${{ github.ref_name }}.
            
            ### Developer Info
            - **Developer:** yohanesoktanio
            - **Organization:** Octa-OSS ( Octanio Open Source Software )
            - **GitHub:** github.com/yohanesokta
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
